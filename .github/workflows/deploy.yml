name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to idtc.online
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Upload files via SCP
        uses: appleboy/scp-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          source: "index.html"
          target: "/home/admin/domains/idtc.online/public_html"

      - name: Set permissions
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT || 22 }}
          script: |
            DEPLOY_PATH="/home/admin/domains/idtc.online/public_html"
            find "$DEPLOY_PATH" -type f -exec chmod 644 {} \;
            find "$DEPLOY_PATH" -type d -exec chmod 755 {} \;
            echo "Deployed successfully to $DEPLOY_PATH"

      - name: Health check
        run: |
          sleep 5
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" "https://idtc.online" || echo "000")
          echo "HTTP Status: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "301" ] || [ "$HTTP_CODE" = "302" ]; then
            echo "Site is live!"
          else
            echo "Warning: HTTP $HTTP_CODE (DNS may need time)"
          fi

      - name: Summary
        if: always()
        run: |
          echo "## Deployment to idtc.online" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**URL:** https://idtc.online" >> $GITHUB_STEP_SUMMARY
