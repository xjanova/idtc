name: Auto Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  release:
    name: Create Release
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate version tag
        id: version
        run: |
          DATE=$(date +'%Y.%m.%d')
          # Count releases on same date to handle multiple releases/day
          COUNT=$(git tag --list "v${DATE}*" | wc -l | tr -d ' ')
          if [ "$COUNT" -eq "0" ]; then
            TAG="v${DATE}"
          else
            TAG="v${DATE}.${COUNT}"
          fi
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "date=$(date +'%B %d, %Y')" >> $GITHUB_OUTPUT

      - name: Get commit messages for changelog
        id: changelog
        run: |
          PREV_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "")
          if [ -z "$PREV_TAG" ]; then
            COMMITS=$(git log --pretty=format:"- %s" | head -20)
          else
            COMMITS=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s")
          fi
          echo "commits<<ENDOFCHANGELOG" >> $GITHUB_OUTPUT
          echo "$COMMITS" >> $GITHUB_OUTPUT
          echo "ENDOFCHANGELOG" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "IDTC Whitepaper ${{ steps.version.outputs.tag }}"
          body: |
            ## IDTC Energy Capital — Whitepaper Update

            **Released:** ${{ steps.version.outputs.date }}
            **Site:** https://idtc.online

            ### Changes
            ${{ steps.changelog.outputs.commits }}

            ---
            *Auto-deployed to https://idtc.online via GitHub Actions*
          draft: false
          prerelease: false
